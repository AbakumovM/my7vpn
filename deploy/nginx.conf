server {
    listen 80;
    server_name bot.zevsgate.com;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
python3 -c "import urllib.request,json; data=json.dumps({'event':'payment.succeeded','object':{'id':'31846796-000f-5001-9000-125c871f5a94' 'amount':{'value':'150.00','currency':'RUB'},'metadata':{'pending_id':'1'}}}).encode(); req=urllib.request.Request('https://app.zevsgate.com/api/v1/payments/yookassa/webhook',data=data,headers={'Content-Type':'application/json'},method='POST'); print(urllib.request.urlopen(req).read())"